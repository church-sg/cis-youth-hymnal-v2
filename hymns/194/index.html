    <div class="lyrics"><p><strong>Verse</strong><br>
Change my heart, O God,<br>
Make it ever true;<br>
Change my heart, O God,<br>
May I be like You.</p>
<p><strong>Chorus</strong><br>
You are the Potter,<br>
I am the clay;<br>
Mould me and make me,<br>
This is what I pray.</p>
<p><strong>(Repeat Verse)</strong></p>
